# SopMeals
# Управление питанием: настраиваемая сытость каждого предмета,
# ограничение переедания одной еды, кастомные блюда и пары "еда + напиток".

# Блокировать ванильное восстановление голода и насыщения от еды.
# true  = вся еда восстанавливает ровно столько, сколько прописано в "foods" ниже.
# false = ваниль работает как обычно, а "foods" даёт бонус сверху.
block-vanilla-nutrition: true

# Ограничение повторного поедания одной и той же еды.
repeat-limit:
  max-per-period: 3
  period-seconds: 300
  block-consume: false
  message: "&cТы уже наелся этим. Попробуй что-нибудь другое."
  overeating-effects:
    - "HUNGER:200:0"
    - "NAUSEA:100:0"

# Пары "еда + напиток" — дают эффекты-усилители.
# Если игрок съел еду и в течение pairing-window-seconds выпил напиток (или наоборот) — получает эффекты.
# food/drink: материал (COOKED_BEEF) или напиток BreweryX ("brewery:Red Wine"). Регистр не важен.
# effects: список "ТИП:длительность_тиков:уровень"
# message: сообщение игроку (& и PlaceholderAPI)
pairing-window-seconds: 60

pairings:
  wine-with-meat:
    food: COOKED_BEEF
    drink: "brewery:Red Wine"
    effects:
      - "REGENERATION:200:0"
    message: "&cСтейк под вино — изысканно."

  beer-with-bread:
    food: BREAD
    drink: "brewery:Beer"
    effects:
      - "STRENGTH:300:0"
    message: "&6Хлеб с пивом — сила простоты."

  coffee-with-cookie:
    food: COOKIE
    drink: "brewery:Coffee"
    effects:
      - "SPEED:400:0"
    message: "&fКофе с печеньем — бодрое утро!"

  vodka-with-potato:
    food: BAKED_POTATO
    drink: "brewery:Vodka"
    effects:
      - "DAMAGE_RESISTANCE:300:0"
    message: "&fКартошка под водочку — крепче стали."

  mead-with-bread:
    food: BREAD
    drink: "brewery:Mead"
    effects:
      - "ABSORPTION:300:0"
    message: "&6Хлеб с медовухой — тепло внутри."

  rum-with-fish:
    food: COOKED_COD
    drink: "brewery:Spicy Rum"
    effects:
      - "WATER_BREATHING:400:0"
    message: "&3Рыба и ром — дыхание моряка."

  wine-with-pie:
    food: PUMPKIN_PIE
    drink: "brewery:Red Wine"
    effects:
      - "REGENERATION:100:0"
      - "SATURATION:60:0"
    message: "&dПирог и вино — праздничный ужин."

