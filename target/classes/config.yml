# SopMeals
# Еда и напитки, съеденные в течение одного "приёма пищи", складываются в комбо.
# Когда набор съеденного совпадает с комбо ниже — игрок получает бонус сытости.
# Обычная ванильная еда продолжает работать как всегда, бонус идёт сверху.

# Сколько секунд съеденные предметы считаются частью одного приёма пищи.
meal-window-seconds: 120

# Убирать ли ингредиенты из учёта после срабатывания комбо,
# чтобы один и тот же съеденный предмет не засчитывался в два комбо подряд.
consume-on-combo: true

# Блокировать ванильное восстановление голода и насыщения от еды.
# true  = вся еда восстанавливает ровно столько, сколько прописано в "foods" ниже.
# false = ваниль работает как обычно, а "foods" даёт бонус сверху.
block-vanilla-nutrition: true

# Ограничение повторного поедания одной и той же еды.
# Нельзя спамить одну еду — после max-per-period штук за period-seconds она перестаёт давать бонус.
# block-consume: true — полностью блокирует поедание сверх лимита (отменяет событие).
repeat-limit:
  max-per-period: 3
  period-seconds: 300
  block-consume: false
  message: "&cТы уже наелся этим. Попробуй что-нибудь другое."
  # Эффекты при переедании (когда лимит превышен).
  # Формат: ТИП:длительность_тиков:уровень
  overeating-effects:
    - "HUNGER:200:0"
    - "NAUSEA:100:0"

# Сколько сытости (food) и насыщения (saturation) даёт каждый предмет.
# food = единицы голода (1 = пол-окорочка; ваниль хлеба = 5, стейка = 8).
# saturation = единицы насыщения (ваниль хлеба = 6.0, стейка = 12.8).
# Если предмета нет в списке — он даёт 0 (при block-vanilla-nutrition: true это значит "не кормит").
# Подправь под свой баланс. Комбо дают бонус СВЕРХ этих значений.
