# SopMeals
# Еда и напитки, съеденные в течение одного "приёма пищи", складываются в комбо.
# Когда набор съеденного совпадает с комбо ниже — игрок получает бонус сытости.
# Обычная ванильная еда продолжает работать как всегда, бонус идёт сверху.

# Сколько секунд съеденные предметы считаются частью одного приёма пищи.
meal-window-seconds: 120

# Убирать ли ингредиенты из учёта после срабатывания комбо,
# чтобы один и тот же съеденный предмет не засчитывался в два комбо подряд.
consume-on-combo: true

# Блокировать ванильное восстановление голода и насыщения от еды.
# true  = обычная еда сама по себе НЕ кормит, сытость дают только комбо.
# false = еда работает как в ваниле, а бонус комбо идёт сверху.
block-vanilla-nutrition: false

# Ограничение повторного поедания одной и той же еды.
# Нельзя спамить одну еду — после max-per-period штук за period-seconds она перестаёт давать бонус.
# block-consume: true — полностью блокирует поедание сверх лимита (отменяет событие).
repeat-limit:
  max-per-period: 3
  period-seconds: 300
  block-consume: false
  message: "&cТы уже наелся этим. Попробуй что-нибудь другое."

# Базовый бонус за каждый отдельный предмет (вне комбо).
# food = единицы голода (1 = пол-окорочка), saturation = насыщение.
# Если предмета нет в списке — бонус 0 (только ваниль + комбо).
# Работает с учётом repeat-limit: если лимит превышен — бонус не даётся.
foods:
  BREAD:
    food: 1
    saturation: 1.0
  COOKED_BEEF:
    food: 2
    saturation: 2.0
  COOKED_PORKCHOP:
    food: 2
    saturation: 2.0
  COOKED_CHICKEN:
    food: 1
    saturation: 1.5
  COOKED_MUTTON:
    food: 1
    saturation: 1.5
  COOKED_SALMON:
    food: 1
    saturation: 1.5
  COOKED_COD:
    food: 1
    saturation: 1.0
  BAKED_POTATO:
    food: 1
    saturation: 1.0
  COOKED_RABBIT:
    food: 1
    saturation: 1.5
  PUMPKIN_PIE:
    food: 1
    saturation: 1.0
  GOLDEN_CARROT:
    food: 2
    saturation: 3.0
  COOKIE:
    food: 0
    saturation: 0.5
  DRIED_KELP:
    food: 0
    saturation: 0.5
  HONEY_BOTTLE:
    food: 1
    saturation: 0.5
  MILK_BUCKET:
    food: 0
    saturation: 1.0

# Минимальный интервал (в секундах) между повторными срабатываниями одного комбо для игрока.
combo-cooldown-seconds: 1

# Комбинации.
# ingredients: ключ -> требуемое количество.
#   - ванильные предметы: имя Material (BREAD, MILK_BUCKET, COOKED_BEEF, BAKED_POTATO ...)
#   - напитки BreweryX:    "brewery:Имя" — это имя рецепта нормального качества
#       (среднее из "name: bad/normal/good" в recipes.yml; для wine это "Red Wine",
#        для beer — "Beer", для rum — "Spicy Rum" и т.д.). Регистр не важен.
# food:        сколько единиц голода добавить (1 = пол-окорочка)
# saturation:  сколько насыщения добавить
# effects:     список "ТИП:длительность_тиков:уровень" (необязательно)
# message:     сообщение игроку при срабатывании (необязательно, поддерживает & и PlaceholderAPI)
